name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: joaoaugusto-dev
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=22C55E&color_dots=#ECFDF5,#BBF7D0,#86EFAC,#22C55E,#15803D

      - name: Publish generated files
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
