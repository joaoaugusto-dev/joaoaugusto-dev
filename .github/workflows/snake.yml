name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: joaoaugusto-dev
          outputs: |
            dist/github-snake-purple-green.svg?palette=github-dark&color_snake=#39FF14&color_dots=#161B22,#3B0764,#6D28D9,#A855F7,#C084FC

      - name: Publish generated files
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
