name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: joaoaugusto-dev
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=6D28D9&color_dots=#F5F3FF,#DDD6FE,#A78BFA,#7C3AED,#4C1D95
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=A855F7&color_dots=#161B22,#3B0764,#5B21B6,#7C3AED,#C084FC

      - name: Publish generated files
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
