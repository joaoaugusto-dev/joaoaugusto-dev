name: Update profile README

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update recent repositories section
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const username = "joaoaugusto-dev";
            const readmePath = "README.md";
            const start = "<!-- RECENT_REPOS:START -->";
            const end = "<!-- RECENT_REPOS:END -->";

            const { data: repos } = await github.rest.repos.listForUser({
              username,
              sort: "pushed",
              direction: "desc",
              per_page: 100,
              type: "owner",
            });

            const visibleRepos = repos
              .filter((repo) => !repo.fork && !repo.archived)
              .filter((repo) => repo.name.toLowerCase() !== username.toLowerCase())
              .slice(0, 6);

            const escapeHtml = (value = "") =>
              String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");

            const repoPath = (repo) => `${username}/${encodeURIComponent(repo.name)}`;
            const description = (repo) =>
              repo.description
                ? escapeHtml(repo.description)
                : "Repositório público atualizado automaticamente.";

            const lastCommitBadge = (repo) =>
              `https://img.shields.io/github/last-commit/${repoPath(repo)}?style=flat-square&color=6D28D9&labelColor=1F103A&label=%C3%9Altimo%20commit`;

            const languageBadge = (repo) =>
              `https://img.shields.io/github/languages/top/${repoPath(repo)}?style=flat-square&color=4C1D95&labelColor=1F103A`;

            const rows = [];
            for (let index = 0; index < visibleRepos.length; index += 2) {
              const pair = visibleRepos.slice(index, index + 2);
              const cells = pair
                .map((repo) =>
                  [
                    '    <td width="50%">',
                    `      <a href="${repo.html_url}"><strong>${escapeHtml(repo.name)}</strong></a>`,
                    `      <p>${description(repo)}</p>`,
                    `      <img src="${lastCommitBadge(repo)}" alt="Último commit em ${escapeHtml(repo.name)}" />`,
                    `      <img src="${languageBadge(repo)}" alt="Linguagem principal de ${escapeHtml(repo.name)}" />`,
                    "    </td>",
                  ].join("\n")
                )
                .join("\n");

              if (pair.length === 1) {
                rows.push(`<tr>\n${cells}\n    <td width="50%"></td>\n  </tr>`);
              } else {
                rows.push(`<tr>\n${cells}\n  </tr>`);
              }
            }

            const generated = [
              start,
              "<table>",
              rows.join("\n"),
              "</table>",
              end,
            ].join("\n");

            const readme = fs.readFileSync(readmePath, "utf8");
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`);

            if (!pattern.test(readme)) {
              throw new Error("Recent repositories markers were not found in the README.");
            }

            fs.writeFileSync(readmePath, readme.replace(pattern, generated));

      - name: Commit README update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update recent repositories"
          file_pattern: README.md
